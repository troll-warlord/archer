# Minimal — VPC + 1 EC2 bastion
# Tests that unused builders (RDS, EFS, ALB, …) are silently skipped.

project: my-app
stack: dev
provider: aws
region: us-east-1

resources:
  vpc:
    name: main-vpc
    cidr_block: 10.0.0.0/16

  subnets:
    - name: public-1
      cidr_block: 10.0.1.0/24
      availability_zone: us-east-1a
      type: public

    - name: private-1
      cidr_block: 10.0.10.0/24
      availability_zone: us-east-1a
      type: private

  ec2:
    - name: bastion
      instance_type: t3.micro
      ami: ami-0c02fb55956c7d316    # Amazon Linux 2 — us-east-1
      subnet_ref: public-1
      assign_public_ip: true
      tags:
        Role: bastion
